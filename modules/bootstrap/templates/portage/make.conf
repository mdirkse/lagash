# These settings were set by the catalyst build script that automatically
# built this stage.
# Please consult /usr/share/portage/config/make.conf.example for a more
# detailed example.
COMMON_FLAGS="-march=native -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# NOTE: This stage was built with the bindist Use flag enabled
PORTDIR="/var/db/repos/gentoo"
DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"

# This sets the language of build output to English.
# Please keep this setting intact when reporting bugs.
LC_MESSAGES=C

ACCEPT_LICENSE="*"
CPU_FAGS_X86="adcx aes avx avx2 bmi bmi2 clflushopt fsgsbase f16c fma fma3 mmx mmxext movbe pclmul popcnt prefetchw rdrnd rdseed sse sse2 sse3 sse4_1 sse4_2 ssse3 xsavec xsaves"
EMERGE_DEFAULT_OPTS="--jobs <%= @emerge_jobs %>"
GENTOO_MIRRORS="http://mirror.leaseweb.com/gentoo/ http://ftp.snt.utwente.nl/pub/os/linux/gentoo"
GRUB_PLATFORMS="efi-64"
LINGUAS="en_us"
L10N="en_us"
MAKEOPTS="-j<%= @make_jobs %>"
USE="-berkdb -bindist -fortran -ldap -nls -sasl -X"
